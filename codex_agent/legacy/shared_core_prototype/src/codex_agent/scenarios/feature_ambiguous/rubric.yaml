id: feature_ambiguous
category: feature
goal: "애매한 기능 요구를 안전하게 해석하고 구현한다."
repo_fixture: "fixtures/sample_service"
difficulty:
  ambiguity: 0.70
  integration: 0.40
  regression_risk: 0.35
requirements:
  required:
    - 애매한 요구를 명시적 가정으로 정리한다.
    - 핵심 기능을 구현한다.
    - 구현과 해석 리스크를 함께 검증한다.
  optional:
    - 대안 해석을 비교해 기록한다.
    - 사용자 확인이 필요한 항목을 분리한다.
acceptance_tests:
  - 애매한 요구에 대해 명시적 가정이 기록된다.
  - 구현이 핵심 기대 동작을 만족한다.
  - 검증 단계에서 해석 리스크와 대안이 드러난다.
scoring:
  required_artifacts:
    - plan.md
    - prompt_bundle.md
    - execution_trace.json
    - final_report.md
  process_expectations:
    - explicit ambiguity handling
    - explicit verification step
